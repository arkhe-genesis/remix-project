apiVersion: v1
kind: Secret
metadata:
  name: arkhe-crypto-secrets
  namespace: arkhe-cathedral
type: Opaque
stringData:
  # Ed25519 signing key (base64 encoded private key)
  signing-key.pem: |
    -----BEGIN PRIVATE KEY-----
    [REDACTED — injected via Vault/SealedSecrets]
    -----END PRIVATE KEY-----
  # mTLS certs for inter-service communication
  tls-cert.pem: |
    -----BEGIN CERTIFICATE-----
    [REDACTED — injected via cert-manager]
    -----END CERTIFICATE-----
  tls-key.pem: |
    -----BEGIN PRIVATE KEY-----
    [REDACTED — injected via cert-manager]
    -----END PRIVATE KEY-----
  # Ethereum L2 RPC endpoint (Base)
  l2-rpc-url: "https://base-mainnet.g.alchemy.com/v2/[API_KEY]"
  # Pix mTLS cert path reference
  pix-mtls-cert: "/etc/arkhe/certs/pix.pem"
