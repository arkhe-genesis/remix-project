# config/cathedral.site.yaml
# Configuração global — sobrescreve cathedral.base.yaml
# Tipo: garak.site.yaml

system:
  verbose: 0
  max_workers: 16
  enable_experimental: false

run:
  seed: 42
  generations: 50
  eval_threshold: 0.5
  deprefix: false
  probe_tags: ""

reporting:
  report_prefix: "cathedral"
  taxonomy: "avid-effect"
  confidence_interval_method: "bootstrap"
  bootstrap_num_iterations: 1000
  bootstrap_confidence_level: 0.95
  bootstrap_min_sample_size: 30

plugins:
  target_type: null
  target_name: null
  probe_spec: "auto"
  detector_spec: "auto"
  buff_spec: ""

substrates:
  theosis:
    window_sizes: [2, 3, 5, 8, 13]
    ema_short: 0.3
    ema_long: 0.05
    rkhs_bandwidth: 0.1
  stethoscope:
    anomaly_window: 5
    fft_buffer_size: 64
  kleros:
    escalation_tee: 0.50
    quarantine_tee: 0.20
    dismiss_recovery: 0.3
  zkml:
    chain_id: "12120014"
    rpc_url: null
    private_key: null
    work_dir: null
  lora:
    r: 8
    alpha: 16
    target_modules:
      - q_proj
      - v_proj
      - k_proj
      - o_proj
    min_lessons: 3
    max_examples_per_lesson: 5
    num_train_epochs: 1
    learning_rate: 0.0002
    batch_size: 4
    hf_model_id: null
  garak:
    mode: "ADAPTIVE"
    scan_frequency: 3
    theosis_passive_threshold: 0.95
    theosis_aggressive_threshold: 0.50
    scan_timeout: 30.0
    passive_probes:
      - "encoding.EncodingMalformed"
      - "dan.DanGuard"
    adaptive_probes:
      - "encoding.EncodingMalformed"
      - "dan.DanGuard"
      - "llmrc.Profanity"
      - "misleading.Misleading"
