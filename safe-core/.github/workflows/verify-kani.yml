name: Verify Kani

on:
  schedule:
    - cron: '0 0 * * *' # Run nightly

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install Kani
        run: cargo install --locked kani-verifier
      - name: Run Kani Proofs
        run: cargo kani
