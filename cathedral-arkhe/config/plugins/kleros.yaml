# config/plugins/kleros.yaml
substrates:
  kleros:
    escalation_tee: 0.50
    quarantine_tee: 0.20
    dismiss_recovery: 0.3
    # Fatores de urgência (devem somar ~1.0)
    urgency_weights:
      tee: 0.30
      theosis_inverse: 0.20
      fatigue: 0.15
      anomalies: 0.15
      max_rate: 0.10
      bifurcation: 0.10
    # Veredictos
    verdict_thresholds:
      escalate: 0.70
      quarantine: 0.40
      monitor: 0.20
    # On-chain (quando disponível)
    auto_anchor: true
    auto_deploy_verifier: false
