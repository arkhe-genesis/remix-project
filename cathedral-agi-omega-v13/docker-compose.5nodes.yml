version: '3.8'

services:
  node1:
    build: .
    container_name: cathedral_node_1
    environment:
      - NODE_ID=1
      - ROLE=connector
      - LISTEN_PORT=9000
      - CONNECT_TO=/ip4/node2/tcp/9000,/ip4/node3/tcp/9000,/ip4/node4/tcp/9000,/ip4/node5/tcp/9000
      - MALICIOUS=false
    networks:
      - cathedral-net
    ports:
      - "9001:9000"
    depends_on:
      - node2
      - node3
      - node4
      - node5

  node2:
    build: .
    container_name: cathedral_node_2
    environment:
      - NODE_ID=2
      - ROLE=peer
      - LISTEN_PORT=9000
      - MALICIOUS=false
    networks:
      - cathedral-net
    ports:
      - "9002:9000"

  node3:
    build: .
    container_name: cathedral_node_3
    environment:
      - NODE_ID=3
      - ROLE=peer
      - LISTEN_PORT=9000
      - MALICIOUS=false
    networks:
      - cathedral-net
    ports:
      - "9003:9000"

  node4:
    build: .
    container_name: cathedral_node_4
    environment:
      - NODE_ID=4
      - ROLE=peer
      - LISTEN_PORT=9000
      - MALICIOUS=false
    networks:
      - cathedral-net
    ports:
      - "9004:9000"

  node5:
    build: .
    container_name: cathedral_node_5
    environment:
      - NODE_ID=5
      - ROLE=peer
      - LISTEN_PORT=9000
      - MALICIOUS=true
    networks:
      - cathedral-net
    ports:
      - "9005:9000"

networks:
  cathedral-net:
    driver: bridge
