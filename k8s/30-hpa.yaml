apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: brasilfinance-hpa
  namespace: arkhe-cathedral
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: brasilfinance
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agency-hpa
  namespace: arkhe-cathedral
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agency
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
