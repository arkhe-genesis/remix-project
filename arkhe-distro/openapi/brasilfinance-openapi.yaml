openapi: 3.1.0
info:
  title: ARKHE BrasilFinance API
  version: 1.0.0
  description: Operacoes Pix, QR Code BR Code, Compliance
servers:
  - url: https://api.arkhe.cathedral/api/v1
paths:
  /finance/pix:
    post:
      operationId: initiatePix
      summary: Inicia pagamento Pix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: '#/components/schemas/ArkheHeader'
                payment:
                  $ref: '#/components/schemas/PixPayment'
                use_zk_privacy:
                  type: boolean
                  default: false
                wait_confirmation:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Pix iniciado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiatePixResponse'
        '422':
          description: Requer ZK privacy para valor > R$ 1.000

  /finance/pix/qr:
    post:
      operationId: generateQR
      summary: Gera QR Code BR Code EMVCo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: '#/components/schemas/ArkheHeader'
                amount_brl:
                  type: number
                  minimum: 0
                description:
                  type: string
                merchant_name:
                  type: string
                merchant_city:
                  type: string
                pix_key:
                  type: string
      responses:
        '200':
          description: QR gerado
          content:
            application/json:
              schema:
                type: object
                properties:
                  qr_code_emvco:
                    type: string
                  qr_image_b64:
                    type: string
                  tx_id:
                    type: string

  /finance/pix/{tx_id}/status:
    get:
      operationId: queryPixStatus
      summary: Consulta status de transacao
      parameters:
        - name: tx_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status da transacao
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  settled_at_ns:
                    type: integer
                    format: int64
                    nullable: true
                  rejection_reason:
                    type: string
                    nullable: true

  /finance/compliance:
    post:
      operationId: complianceCheck
      summary: Verificacao de compliance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: '#/components/schemas/ArkheHeader'
                tx_id:
                  type: string
                check_type:
                  type: string
                  enum: [AML, KYC, FRAUD, SANCTIONS]
                enriched_data:
                  type: string
                  format: byte
      responses:
        '200':
          description: Resultado do compliance
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleared:
                    type: boolean
                  risk_score:
                    type: number
                    minimum: 0
                    maximum: 1
                  alerts:
                    type: array
                    items:
                      type: string
                  engine_used:
                    type: string

components:
  schemas:
    ArkheHeader:
      $ref: './temporalchain-openapi.yaml#/components/schemas/ArkheHeader'

    PixPayment:
      type: object
      required: [tx_id, pix_key, amount_brl, description, creditor_name]
      properties:
        tx_id:
          type: string
          format: uuid
        pix_key:
          type: string
        amount_brl:
          type: number
          minimum: 0.01
        description:
          type: string
          maxLength: 140
        debtor_cpf_cnpj:
          type: string
          nullable: true
        creditor_name:
          type: string

    InitiatePixResponse:
      type: object
      properties:
        tx_id:
          type: string
        status:
          type: string
          enum: [PENDING, SETTLED, REJECTED, ERROR]
        end_to_end_id:
          type: string
          nullable: true
        qr_code_emvco:
          type: string
          nullable: true
        zk_proof_hash:
          type: string
          format: byte
          nullable: true
        temporal_event_id:
          type: string
