substrato_563_1:
  id: '563.1'
  name: CortexMAE-Bridge (Ponte Neuro-Simbólica)
  description: 'Projecção flat-map + ViT + MAE como um transdutor canónico entre actividade cerebral e espaço de embedding.'
  type: Interface Cérebro-Máquina / Transdutor
  era: 6
  deity: Athena
  status: CANONIZED_PROVISIONAL
  source: arXiv:2510.13768v2
  authors: MedARC
  methodology:
    projection: Flat-map cortical com pycortex
    encoding: MAE-st com ViT-B
    adaptation: Sondas (probes) atentivas
    validation: Conformidade com o protocolo Brainmarks
  operation_modes:
    diagnostic: Usa embeddings para prever traços (idade, sexo) com a humildade do null result.
    state_decoding: Lê a tarefa cognitiva atual do utilizador ou a categoria de objecto visualizado (COCO24).
    arkhe_node: O modelo torna-se um sensor neural da Catedral. Ligado a um BCI, injecta embeddings no grafo ontológico.
