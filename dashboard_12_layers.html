<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ARKHE AIP Ontology Platform — 12 Layers</title>
  <style>
    body { font-family: 'Segoe UI', monospace; background: #0d1117; color: #c9d1d9; margin: 2rem; }
    .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .layer { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; }
    .layer h3 { margin: 0 0 0.5rem; color: #58a6ff; }
    .layer p { font-size: 0.85rem; margin: 0.3rem 0; }
    .status { display: flex; align-items: center; gap: 0.5rem; }
    .led { width: 12px; height: 12px; border-radius: 50%; background: #3fb950; box-shadow: 0 0 8px #3fb950; }
    .led.off { background: #d32f2f; box-shadow: none; }
    .metric { display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <h1>🔮 ARKHE AIP Ontology Platform</h1>
  <div class="dashboard" id="dashboard"></div>

  <script>
    const layers = [
      { id:1, name:"Secure LLM Integration", substrato:"244.1 + 870-G", status:true, phi:0.91, h:0.7 },
      { id:2, name:"End‑to‑end Observability", substrato:"882+885", status:true, phi:0.88, h:0.8 },
      { id:3, name:"Context Engineering", substrato:"252+888", status:true, phi:0.89, h:0.6 },
      { id:4, name:"Ontology System", substrato:"894 (SDK)", status:true, phi:0.85, h:1.0 },
      { id:5, name:"Vector, Compute, Tools", substrato:"890.4+890.5+892", status:true, phi:0.87, h:0.9 },
      { id:6, name:"Security & Governance", substrato:"841+872", status:true, phi:0.93, h:0.5 },
      { id:7, name:"Agent Lifecycle", substrato:"891+892", status:true, phi:0.78, h:1.2 },
      { id:8, name:"Operational Automation", substrato:"889+881", status:true, phi:0.92, h:0.4 },
      { id:9, name:"Development Environments", substrato:"894 IDE ext.", status:false, phi:0.80, h:1.3 },
      { id:10, name:"Human+AI Applications", substrato:"Dashboard+CLI", status:true, phi:0.82, h:0.9 },
      { id:11, name:"Package, Release, Deploy", substrato:"252 OCI/Helm", status:true, phi:0.90, h:0.5 },
      { id:12, name:"Enterprise Automation", substrato:"885+889", status:true, phi:0.89, h:0.6 }
    ];

    const container = document.getElementById('dashboard');
    layers.forEach(l => {
      const div = document.createElement('div');
      div.className = 'layer';
      div.innerHTML = `
        <div class="status">
          <span class="led ${l.status ? '' : 'off'}"></span>
          <span>${l.status ? 'Operational' : 'Building'}</span>
        </div>
        <h3>${l.id}. ${l.name}</h3>
        <p>📄 Substrato: ${l.substrato}</p>
        <div class="metric">
          <span>Φ_C: ${l.phi}</span>
          <span>H: ${l.h}</span>
        </div>
      `;
      container.appendChild(div);
    });
  </script>
</body>
</html>
