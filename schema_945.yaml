id: '945'
name: VYPER-EVOLUTION-ENGINE
description: Integração do vyupgrade (banteg) ao ecossistema ARKHE como motor de evolução segura de contratos Vyper. Cada upgrade de contrato na TemporalChain (923) é precedido por análise vyupgrade + prova ZK de equivalência comportamental.
type: Compiler Infrastructure / Smart Contract Evolution
era: 2
deity: Erebus
status: CANONIZED_PROVISIONAL
source: 'GitHub: banteg/vyupgrade — compiler-backed Vyper contract rewriter'
date: '2026-05-29'
upstream:
  repository: https://github.com/banteg/vyupgrade
  author: banteg
  license: MIT (assumed from open-source Python tool)
  language: Python
  package_manager: uv
  versions_covered: 0.2.1 → 0.4.3
methodology:
  rewrite_phase:
    input: Legacy Vyper source (.vy / .vyi)
    process: Syntax transformation via version-gated rules (VY### codes)
    output: Modern Vyper source compatible with target compiler
  validation_phase:
    source_compile: Compile original under source compiler version
    target_compile: Compile rewritten under target compiler version
    abi_comparison: Verify ABI equivalence
    method_id_comparison: Verify method identifier equivalence
    storage_layout_comparison: Verify storage layout equivalence
    safety_gate: Only write if ALL files compile AND no error-level diagnostics
  arkhe_enhancement:
    zk_equivalence_proof: Generate ZK proof that rewrite preserves semantics (Substrato 255)
    temporal_anchor: Anchor upgrade hash + proof on TemporalChain (923)
    glasswing_scan: Pre-upgrade vulnerability scan (944)
    ethics_loop: HITL approval for upgrades affecting >1M USD TVL (266.268)
integration_modes:
- mode: CI/CD Pipeline
  command: vyupgrade contracts/ --check --report-json vyupgrade-report.json
  exit_codes:
    '0': No changes needed
    '1': Files would change (block merge)
    '2': Target compilation failed
    '3': Source compilation failed
    '4': Usage error
    '5': Error-severity diagnostic
  cross_links:
  - '266'
  - '944'
- mode: TemporalChain Upgrade
  command: vyupgrade contracts/ --write --target-version 0.4.3 --bump-pragma
  post_action: Anchor new bytecode hash + ZK equivalence proof + vyupgrade report on 923.2
  cross_links:
  - '923'
  - '923.2'
  - '255'
  - '255.2'
- mode: Federated Learning of Rewrites
  command: Train CBNN (936) on vyupgrade rule applications across 10k+ contracts
  purpose: Predict optimal rewrite sequences for novel syntax patterns
  cross_links:
  - '936'
  - '530'
  - '924'
rule_taxonomy:
  syntax_transforms: VY### codes — version-gated rewrites
  diagnostics: VYD### codes — manual-review items
  aggressive_mode: Behavior-changing rewrites (enum→flag) — requires HITL
  coverage_docs:
  - docs/migration-coverage.md
  - docs/vyper-syntax-history.md
arkhe_cli:
  command: arkhe vyupgrade <path> [--target-version] [--zk-proof] [--anchor] [--glasswing]
  examples:
  - arkhe vyupgrade contracts/ --target-version 0.4.3 --zk-proof --anchor 923.2
  - arkhe vyupgrade contracts/ --check --glasswing --report-json report.json
