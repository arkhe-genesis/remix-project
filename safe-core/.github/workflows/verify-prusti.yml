name: Verify Prusti

on:
  schedule:
    - cron: '0 0 * * *' # Run nightly

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install Prusti
        run: cargo install prusti-contracts
      - name: Run Prusti Proofs
        run: cargo prusti
