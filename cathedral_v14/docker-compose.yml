version: '3.8'

services:
  inference-v14:
    build:
      context: .
      dockerfile: Dockerfile.sidecar
    container_name: cathedral-inference-v14
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SIDECAR_HOST=0.0.0.0
      - SIDECAR_PORT=8000
      - SIDECAR_TOKEN=${SIDECAR_TOKEN:-cathedral-super-secret-token}
      - GGUF_MODEL=unsloth/Qwen3-0.6B-GGUF
      - GGUF_QUANT=Q4_K_M
      - GGUF_CTX=4096
      - GGUF_GPU_LAYERS=-1
      - GGUF_CACHE_DIR=/app/gguf_cache
    volumes:
      - gguf_cache:/app/gguf_cache
    networks:
      - cathedral_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    stop_grace_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  orchestrator-v12:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: cathedral-orchestrator-v12
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      - SIDECAR_URL=http://inference-v14:8000
      - SIDECAR_TOKEN=${SIDECAR_TOKEN:-cathedral-super-secret-token}
    volumes:
      - corte_state:/app/state
    networks:
      - cathedral_internal
    depends_on:
      inference-v14:
        condition: service_healthy
    stop_grace_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: cathedral-prometheus
    restart: unless-stopped
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - cathedral_internal
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

networks:
  cathedral_internal:
    driver: bridge
    internal: true

volumes:
  gguf_cache:
  corte_state:
  prometheus_data:
