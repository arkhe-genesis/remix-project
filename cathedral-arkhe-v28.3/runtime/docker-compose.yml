version: '3.8'

services:
  llm-server:
    image: ghcr.io/huggingface/text-generation-inference:latest
    ports:
      - "8000:8000"
    environment:
      - CATHEDRAL_MODEL_PATH=/models
      - RUST_LOG=info
    volumes:
      - ./models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cathedral-net

  agent-runtime:
    build:
      context: ..
      dockerfile: runtime/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - LLM_SERVER_URL=http://llm-server:8000
      - RUST_LOG=info
    volumes:
      - ../agent:/app/agent
      - ../core:/app/core
      - ../trust:/app/trust
    depends_on:
      llm-server:
        condition: service_healthy
    networks:
      - cathedral-net

  temporal-chain:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: temporalchain
      POSTGRES_USER: cathedral
      POSTGRES_PASSWORD: secure_password
    volumes:
      - temporal-data:/var/lib/postgresql/data
    networks:
      - cathedral-net

  vector-db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - cathedral-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - cathedral-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - cathedral-net

networks:
  cathedral-net:
    driver: bridge

volumes:
  temporal-data:
  qdrant-data:
