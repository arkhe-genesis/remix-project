apiVersion: arkhe.schemas/v1
kind: SchemaBundle
metadata:
  name: temporalchain-v1
  version: "1.0.0"
  substrate: "923"
  seal: "sha3-256:d4e5f6..."
spec:
  service: TemporalChainService
  rpcs:
    CommitEvent:
      description: "Registra evento na L2"
      request:
        header: ArkheHeader
        payload: EventPayload
        wait_for_anchor:
          type: boolean
          default: false
      response:
        event_id: {type: string, format: uuid-v7}
        receipt_hash: {type: bytes, format: sha3-256}
        l2_tx_hash: {type: string, format: eth-tx-hash, nullable: true}
        seal: ArkheSeal
        status:
          type: string
          enum: [RECEIVED_OFFCHAIN, ANCHORED_L2, ANCHORED_L1]

    VerifyAnchor:
      request:
        event_id: {type: string}
        merkle_proof: {type: bytes}
      response:
        valid: {type: boolean}
        l1_block_number: {type: string}
        l1_tx_hash: {type: string}
        root_hash: {type: bytes}

    StreamEvents:
      request:
        filter:
          oneOf:
            - substrate_id: {type: string}
            - session_id: {type: string}
            - event_type: {type: string}
        from_timestamp_ns: {type: integer, format: int64}
        include_seals: {type: boolean, default: false}
      response:
        stream: true
        type: Event

    QueryEvents:
      request:
        substrate_ids: {type: array, items: {type: string}}
        event_type: {type: string}
        from_ns: {type: integer, format: int64}
        to_ns: {type: integer, format: int64}
        limit: {type: integer, default: 100, max: 1000}
        cursor: {type: string, nullable: true}
      response:
        events: {type: array, items: Event}
        next_cursor: {type: string, nullable: true}
        total_count: {type: integer}

  messages:
    EventPayload:
      fields:
        event_type:
          type: string
          enum: [DECISION, ACTION, MEMORY_WRITE, ALERT, POLICY_VIOLATION]
        serialized_data:
          type: bytes
          description: "protobuf Any — schema definido por substrate"
        substrate_id: {type: string}
        parent_event_id: {type: string, nullable: true}

    Event:
      fields:
        event_id: {type: string}
        header: ArkheHeader
        payload: EventPayload
        seal: ArkheSeal
        status:
          type: string
          enum: [RECEIVED_OFFCHAIN, ANCHORED_L2, ANCHORED_L1]

  config:
    batch_size: 1000
    batch_interval_sec: 30
    retention_offchain_days: 90
    l2_contract: "0xTemporalChain..."
    l1_anchor_interval_blocks: 100
