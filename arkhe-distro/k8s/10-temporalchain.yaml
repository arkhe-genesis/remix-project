apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: temporalchain
  namespace: arkhe-cathedral
  labels:
    app: temporalchain
    substrate: "923"
spec:
  serviceName: temporalchain-headless
  replicas: 3
  selector:
    matchLabels:
      app: temporalchain
  template:
    metadata:
      labels:
        app: temporalchain
        substrate: "923"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: arkhe-cathedral-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: temporalchain
        image: arkhe-os/temporalchain:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: grpc
          containerPort: 50051
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        - name: CHAIN_BATCH_SIZE
          value: "1000"
        - name: CHAIN_BATCH_INTERVAL_SEC
          value: "30"
        - name: L2_CONTRACT_ADDRESS
          valueFrom:
            configMapKeyRef:
              name: arkhe-schemas
              key: l2-contract-address
        - name: L2_RPC_URL
          valueFrom:
            secretKeyRef:
              name: arkhe-crypto-secrets
              key: l2-rpc-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        volumeMounts:
        - name: data
          mountPath: /data
        - name: schemas
          mountPath: /etc/arkhe/schemas
        - name: crypto-secrets
          mountPath: /etc/arkhe/secrets
          readOnly: true
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: schemas
        configMap:
          name: arkhe-schemas
      - name: crypto-secrets
        secret:
          secretName: arkhe-crypto-secrets
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: temporalchain
  namespace: arkhe-cathedral
spec:
  selector:
    app: temporalchain
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP
