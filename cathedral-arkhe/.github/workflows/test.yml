# .github/workflows/test.yml
name: Tests

on:
  push:
    branches: [main, "v*"]
  pull_request:
    branches: [main]

jobs:
  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short -k "not slow and not real"
        timeout-minutes: 5

  test-full:
    runs-on: ubuntu-latest
    needs: test-fast
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short --cov=cathedral --cov-report=xml
        timeout-minutes: 15
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check cathedral/
      - run: ruff format --check cathedral/
      - run: mypy cathedral/ --ignore-missing-imports
