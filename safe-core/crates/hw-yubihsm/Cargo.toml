[package]
name = "safe-core-hw-yubihsm"
version = "0.1.0"
edition = "2021"

[features]
default = ["mock"]
yubihsm = ["dep:yubihsm"]
mock = []

[dependencies]
yubihsm = { version = "0.42", optional = true }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
zeroize = { version = "1.8", features = ["derive"] }
sha2 = "0.10"
rand = "0.8"

[dev-dependencies]
hex = "0.4"
