[package]
name = "safe-core-merkle-evaluation"
version = "0.1.0"
edition = "2021"

[dependencies]
# Implementações de Merkle Tree para benchmark
rs_merkle = "1.5"
merkle_light = "0.4"
sha2 = "0.10"
blake3 = "1.8"
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
tracing = "0.1"

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
proptest = "1.6"

[[bench]]
name = "merkle_benchmark"
harness = false
