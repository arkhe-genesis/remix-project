name: "Cathedral AGI Superego Validation"

on:
  pull_request:
    branches:
      - main

jobs:
  validate-proofs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run Proof Rejection Script
        run: |
          cd cathedral-agi-omega
          python INFRASTRUCTURE/ci_cd/reject_unproven.py
