openapi: 3.1.0
info:
  title: ARKHE Glasswing Sentinel API
  version: 1.0.0
  description: Scanner de vulnerabilidades SAST/DAST/IaC/Secrets/Dependencies/Config
servers:
  - url: https://api.arkhe.cathedral/api/v1
paths:
  /glasswing/scans:
    post:
      operationId: scanArtifact
      summary: Inicia scan de artefato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: '#/components/schemas/ArkheHeader'
                artifact:
                  $ref: '#/components/schemas/ArtifactSpec'
                scanner_types:
                  type: array
                  items:
                    type: string
                    enum: [SAST, DAST, IAC, SECRETS, DEPENDENCY, CONFIG]
                block_on_critical:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Scan iniciado/concluido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanArtifactResponse'

  /glasswing/findings:
    get:
      operationId: queryFindings
      summary: Consulta findings
      parameters:
        - name: artifact_id
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Lista de findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  findings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Finding'
                  summary:
                    $ref: '#/components/schemas/Summary'

  /glasswing/alerts/stream:
    get:
      operationId: streamAlerts
      summary: Stream de alertas em tempo real (SSE)
      parameters:
        - name: severity_threshold
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string

components:
  schemas:
    ArkheHeader:
      $ref: './temporalchain-openapi.yaml#/components/schemas/ArkheHeader'

    ArtifactSpec:
      type: object
      properties:
        artifact_id:
          type: string
        artifact_type:
          type: string
          enum: [CODE, IAC, CONFIG, CONTAINER, DEPENDENCY]
        source_uri:
          type: string
        commit_hash:
          type: string
        content_fingerprint:
          type: string
          format: byte

    ScanArtifactResponse:
      type: object
      properties:
        scan_id:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED_CLEAN, COMPLETED_WITH_FINDINGS, BLOCKED]
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
        temporal_event_id:
          type: string

    Finding:
      type: object
      properties:
        finding_id:
          type: string
        scanner_type:
          type: string
        severity:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM, LOW, INFO]
        rule_id:
          type: string
        description:
          type: string
        file_path:
          type: string
        line_number:
          type: integer
        remediation_hint:
          type: string
          format: byte
        cve_id:
          type: string
          nullable: true

    Summary:
      type: object
      properties:
        critical_count:
          type: integer
        high_count:
          type: integer
        medium_count:
          type: integer
        low_count:
          type: integer
        mean_time_to_mitigate_hours:
          type: number
